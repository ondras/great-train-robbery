	<body>
		<select id="font" style="position: absolute">
			<option value="inconsolata">inconsolata</option>
			<option value="monospace">monospace (has box drawing)</option>
			<option value="mononoki">mononoki (has box drawing)</option>
			<option value="cascadiacode">cascadia code (has box drawing)</option>
			<option value="cascadiamono">cascadia mono (has box drawing)</option>
			<option value="xenon3">xenon 3 (old, no box drawing)</option>
			<option value="xenon2" selected>xenon 2 (new variable, has box drawing)</option>
			<option value="metrickal">metrickal (no box drawing)</option>
			<option value="input">input (has box drawing)</option>
		</select>

		<script>
			const fselect = document.querySelector("#font");
			function sync() { document.documentElement.dataset.font = fselect.value; window.dispatchEvent(new Event("resize")); }
			fselect.addEventListener("change", sync);
			sync();
		</script>
