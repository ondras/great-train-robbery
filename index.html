<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<link rel="stylesheet" href="css/index.css" />
	</head>
	<body>
		<select id="font" style="position:absolute;z-index:1">
			<option value="inconsolata">inconsolata</option>
			<option value="monospace">monospace (has box drawing)</option>
			<option value="mononoki">mononoki (has box drawing)</option>
			<option value="cascadiacode">cascadia code (has box drawing)</option>
			<option value="cascadiamono">cascadia mono (has box drawing)</option>
			<option value="xenon3">xenon 3 (old, no box drawing)</option>
			<option value="xenon2" selected>xenon 2 (new variable, has box drawing)</option>
			<option value="metrickal">metrickal (no box drawing)</option>
			<option value="input">input (has box drawing)</option>
		</select>

		<script>
			const fselect = document.querySelector("#font");
			function sync() { document.documentElement.dataset.font = fselect.value; window.dispatchEvent(new Event("resize")); }
			fselect.addEventListener("change", sync);
			sync();
		</script>
<!--
		<main id="intro">intro</main>
-->
		<main id="game">
			<section id="heading" class="border-bottom">The Great Train Robbery</section>

			<section id="nav">
				<span class="border outside single" data-content="map">Town <kbd>m</kbd>ap</span>
				<span class="border outside single" data-content="saloon"><kbd>S</kbd>aloon</span>
				<span class="border outside single" data-content="store"><kbd>G</kbd>eneral store</span>
				<span class="border outside single" data-content="hotel"><kbd>H</kbd>otel</span>
				<span class="border outside single" data-content="action">Start the <kbd>a</kbd>ction</span>
				<span class="border outside single" data-content="help">Help<kbd>?</kbd></span>
			</section>

			<section id="main">
				<section id="map"></section>
				<section id="saloon">
					These are all the people in our town. Manage your party here.
					<template class="confirm-hire">Really hire <span class="name"></span>? It will cost you <span class="gold"></span>.</template>
					<template class="confirm-fire">Really fire <span class="name"></span>? You will get your <span class="gold"></span> back.</template>
				</section>
				<section id="store">
					Your party needs supplies! Buy anything to help you here.
				</section>
				<section id="hotel">
					This is where we plan the heist.
				</section>
				<section id="action">
					<kbd>G</kbd>o for it!
					<template class="confirm">Start the action? Once we start, there is no going back.</template>
				</section>
				<section id="help">???</section>
			</section>

			<section id="log">log</section>

			<section id="status">
				status
			</section>
		</main>

		<script src="index.js"></script>
	</body>
</html>
